# bare minimal
name: googlesheet

on:
    push:
      branches:
        - main

jobs:
    fetch:
      runs-on: ubuntu-latest
      steps:
        - id: jp_sheet
          uses: chronoscore622/sheets@main
          with:
            spreadsheetId: ${{ secrets.SHEET_ID }}
            key: ${{ secrets.SHEETS_API }}
            sheetName: 'Basic&Music'
        - id: echo
          run: echo "The time was ${{ steps.jp_sheet.outputs.result }}"
