# bare minimal
name: googlesheet

on:
    push:
      branches:
        - sheet_pull

jobs:
    fetch:
      runs-on: ubuntu-latest
      steps:
        - id: jp_sheet
          uses: chronoscore622/sheets@v0.0.2
          with:
            spreadsheetId: ${{ secrets.SHEET_ID }}
            key: ${{ secrets.SHEETS_API }}
            sheetName: 'Basic&Music'
          
