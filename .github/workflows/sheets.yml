name: googlesheet

on:
    push:
      branches:
        - sheet_pull

jobs:
    fetch:
      runs-on: ubuntu-latest
      steps:
        - id: fetch_jp_sheet
          uses: chronoscore622/sheets@v0.0.5
          with:
            spreadsheetId: ${{ secrets.SHEET_ID }}
            key: ${{ secrets.SHEETS_API }}
            sheetName: 'Basic&Music'
        - id: echoes
          run: echo ${{ steps.fetch_jp_sheet.outputs.test }}

